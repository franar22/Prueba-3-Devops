name: CI/CD - Innovatech Chile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: innovatech-cluster

jobs:
  build-and-push:
    name: Build & Push a ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=http://${{ secrets.ALB_DNS }} \
            -f Dockerfile.front \
            -t ${{ env.ECR_REGISTRY }}/innovatech-frontend:latest \
            -t ${{ env.ECR_REGISTRY }}/innovatech-frontend:${{ github.sha }} \
            ./front_despacho
          docker push ${{ env.ECR_REGISTRY }}/innovatech-frontend:latest
          docker push ${{ env.ECR_REGISTRY }}/innovatech-frontend:${{ github.sha }}

      - name: Build y Push Backend Despachos
        run: |
          docker build \
            -f Dockerfile.back-despachos \
            -t ${{ env.ECR_REGISTRY }}/innovatech-back-despachos:latest \
            -t ${{ env.ECR_REGISTRY }}/innovatech-back-despachos:${{ github.sha }} \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ env.ECR_REGISTRY }}/innovatech-back-despachos:latest
          docker push ${{ env.ECR_REGISTRY }}/innovatech-back-despachos:${{ github.sha }}

      - name: Build y Push Backend Ventas
        run: |
          docker build \
            -f Dockerfile.back-ventas \
            -t ${{ env.ECR_REGISTRY }}/innovatech-back-ventas:latest \
            -t ${{ env.ECR_REGISTRY }}/innovatech-back-ventas:${{ github.sha }} \
            ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ env.ECR_REGISTRY }}/innovatech-back-ventas:latest
          docker push ${{ env.ECR_REGISTRY }}/innovatech-back-ventas:${{ github.sha }}

  deploy:
    name: Deploy a ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Frontend a ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service innovatech-frontend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Backend Despachos a ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service innovatech-despachos-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Backend Ventas a ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service innovatech-ventas-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Resumen del deploy
        run: |
          echo "Deploy completado"
          echo "Commit: ${{ github.sha }}"
          echo "URL: http://${{ secrets.ALB_DNS }}"