name: CI/CD - Innovatech Chile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: innovatech-cluster

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build y Push de imágenes a ECR
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push a ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Frontend ────────────────────────────────────────────────
      - name: Build imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./Dockerfile.front
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/innovatech-frontend:latest
            ${{ env.ECR_REGISTRY }}/innovatech-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://${{ secrets.ALB_DNS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend Despachos ───────────────────────────────────────
      - name: Build imagen Backend Despachos
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./Dockerfile.back-despachos
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/innovatech-back-despachos:latest
            ${{ env.ECR_REGISTRY }}/innovatech-back-despachos:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend Ventas ──────────────────────────────────────────
      - name: Build imagen Backend Ventas
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./Dockerfile.back-ventas
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/innovatech-back-ventas:latest
            ${{ env.ECR_REGISTRY }}/innovatech-back-ventas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Deploy a ECS (solo en push a main)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy a ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Deploy Frontend ─────────────────────────────────────────
      - name: Obtener Task Definition actual - Frontend
        run: |
          aws ecs describe-task-definition \
            --task-definition innovatech-frontend \
            --query taskDefinition > task-def-frontend.json

      - name: Actualizar imagen en Task Definition - Frontend
        id: task-def-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-frontend.json
          container-name: frontend
          image: ${{ env.ECR_REGISTRY }}/innovatech-frontend:${{ github.sha }}

      - name: Deploy Frontend a ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
          service: innovatech-frontend-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Deploy Backend Despachos ────────────────────────────────
      - name: Obtener Task Definition actual - Despachos
        run: |
          aws ecs describe-task-definition \
            --task-definition innovatech-back-despachos \
            --query taskDefinition > task-def-despachos.json

      - name: Actualizar imagen en Task Definition - Despachos
        id: task-def-despachos
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-despachos.json
          container-name: back-despachos
          image: ${{ env.ECR_REGISTRY }}/innovatech-back-despachos:${{ github.sha }}

      - name: Deploy Backend Despachos a ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-despachos.outputs.task-definition }}
          service: innovatech-despachos-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Deploy Backend Ventas ───────────────────────────────────
      - name: Obtener Task Definition actual - Ventas
        run: |
          aws ecs describe-task-definition \
            --task-definition innovatech-back-ventas \
            --query taskDefinition > task-def-ventas.json

      - name: Actualizar imagen en Task Definition - Ventas
        id: task-def-ventas
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-ventas.json
          container-name: back-ventas
          image: ${{ env.ECR_REGISTRY }}/innovatech-back-ventas:${{ github.sha }}

      - name: Deploy Backend Ventas a ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-ventas.outputs.task-definition }}
          service: innovatech-ventas-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Resumen del deploy
        run: |
          echo "✅ Deploy completado exitosamente"
          echo "Commit: ${{ github.sha }}"
          echo "URL: http://${{ secrets.ALB_DNS }}"
