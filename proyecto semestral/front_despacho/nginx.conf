server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Necesario para que React Router funcione (no devuelve 404 en rutas)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy al backend de despachos
    location /api/despachos/ {
        proxy_pass http://back-despachos:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy al backend de ventas
    location /api/ventas/ {
        proxy_pass http://back-ventas:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
